version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: telegram-saas-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: telegram_saas
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - telegram-network

  redis:
    image: redis:7-alpine
    container_name: telegram-saas-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - telegram-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: telegram-saas-backend
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/telegram_saas?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      TELEGRAM_WEBHOOK_URL: ${API_URL}/api/webhooks/telegram
      BLACKPAY_API_URL: https://api.blackpay.com.br
      BLACKPAY_API_KEY: ${BLACKPAY_API_KEY}
      BLACKPAY_WEBHOOK_SECRET: ${BLACKPAY_WEBHOOK_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-https://telegram-saas-frontend.vercel.app}
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - telegram-network

  nginx:
    image: nginx:alpine
    container_name: telegram-saas-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - telegram-network

networks:
  telegram-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  backend_node_modules:
